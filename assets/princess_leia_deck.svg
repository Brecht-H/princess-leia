<svg viewBox="0 0 1000 500" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Ocean background gradient -->
    <radialGradient id="waterGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="hsl(222, 47%, 18%)" stop-opacity="0.65" />
      <stop offset="100%" stop-color="hsl(222, 47%, 9%)" stop-opacity="0" />
    </radialGradient>

    <!-- Metallic hardware gradient -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(215, 10%, 80%)" />
      <stop offset="50%" stop-color="hsl(215, 10%, 40%)" />
      <stop offset="100%" stop-color="hsl(215, 10%, 90%)" />
    </linearGradient>

    <!-- Teak floor gradient -->
    <linearGradient id="teakGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="hsl(33, 35%, 32%)" />
      <stop offset="50%" stop-color="hsl(33, 40%, 40%)" />
      <stop offset="100%" stop-color="hsl(33, 35%, 28%)" />
    </linearGradient>

    <!-- Cozy cabin lighting gradient -->
    <radialGradient id="cabinLight" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="rgba(255, 220, 130, 0.25)" />
      <stop offset="100%" stop-color="rgba(255, 220, 130, 0)" />
    </radialGradient>

    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Water Grid Backdrop -->
  <g opacity="0.12">
    <line x1="0" y1="50" x2="1000" y2="50" stroke="hsl(190, 95%, 50%)" stroke-width="0.5" />
    <line x1="0" y1="150" x2="1000" y2="150" stroke="hsl(190, 95%, 50%)" stroke-width="0.5" />
    <line x1="0" y1="250" x2="1000" y2="250" stroke="hsl(190, 95%, 50%)" stroke-width="0.5" />
    <line x1="0" y1="350" x2="1000" y2="350" stroke="hsl(190, 95%, 50%)" stroke-width="0.5" />
    <line x1="0" y1="450" x2="1000" y2="450" stroke="hsl(190, 95%, 50%)" stroke-width="0.5" />

    <line x1="100" y1="0" x2="100" y2="500" stroke="hsl(190, 95%, 50%)" stroke-width="0.5" />
    <line x1="300" y1="0" x2="300" y2="500" stroke="hsl(190, 95%, 50%)" stroke-width="0.5" />
    <line x1="500" y1="0" x2="500" y2="500" stroke="hsl(190, 95%, 50%)" stroke-width="0.5" />
    <line x1="700" y1="0" x2="700" y2="500" stroke="hsl(190, 95%, 50%)" stroke-width="0.5" />
    <line x1="900" y1="0" x2="900" y2="500" stroke="hsl(190, 95%, 50%)" stroke-width="0.5" />
  </g>

  <!-- Water Glow Behind Hull -->
  <ellipse cx="500" cy="250" rx="420" ry="180" fill="url(#waterGlow)" />

  <!-- ==========================================================================
       PRIMARY HULL PROFILE
       ========================================================================== -->
  <g id="hull-group" transform="translate(10, 0)">
    
    <!-- Outer Hull Shell Glow -->
    <path d="M 120 250 C 150 170, 300 130, 800 130 C 850 130, 880 160, 890 250 C 880 340, 850 370, 800 370 C 300 370, 150 330, 120 250 Z" 
          fill="none" stroke="rgba(0, 240, 255, 0.12)" stroke-width="12" filter="url(#neonGlow)" />

    <!-- Solid White Hull Base -->
    <path d="M 120 250 C 150 170, 300 130, 800 130 C 850 130, 880 160, 890 250 C 880 340, 850 370, 800 370 C 300 370, 150 330, 120 250 Z" 
          fill="hsl(222, 35%, 15%)" stroke="hsl(215, 20%, 85%)" stroke-width="3.5" />

    <!-- Inverted Rake Bow -->
    <path d="M 120 250 L 115 250" stroke="hsl(42, 100%, 53%)" stroke-width="4.5" stroke-linecap="round" />

    <!-- ==========================================================================
         VIEW 1: DECK / EXTERIOR (DECK GEAR & RIGGING)
         ========================================================================== -->
    <g id="deck-view">
      
      <!-- Walk-around Deck recesses -->
      <path d="M 170 250 C 190 185, 320 150, 780 150 L 780 172 C 340 172, 220 200, 200 250 Z" 
            fill="hsl(222, 35%, 18%)" opacity="0.8" stroke="hsl(215, 20%, 35%)" stroke-width="0.75" />
      <path d="M 170 250 C 190 315, 320 350, 780 350 L 780 328 C 340 328, 220 300, 200 250 Z" 
            fill="hsl(222, 35%, 18%)" opacity="0.8" stroke="hsl(215, 20%, 35%)" stroke-width="0.75" />

      <!-- Teak Flooring (Cockpit floor and benches) -->
      <path d="M 680 195 L 820 195 L 820 220 L 740 220 L 740 280 L 820 280 L 820 305 L 680 305 Z" fill="url(#teakGrad)" opacity="0.85" stroke="hsl(33, 40%, 25%)" stroke-width="0.5" />

      <!-- Deckhouse (Cabin Roof) -->
      <path d="M 330 190 C 360 180, 500 180, 660 190 L 660 310 C 500 320, 360 320, 330 310 Z" 
            fill="hsl(222, 35%, 11%)" stroke="hsl(215, 20%, 55%)" stroke-width="1.5" />

      <!-- Companionway Slider Hatch -->
      <rect x="610" y="220" width="50" height="60" rx="3" fill="hsl(222, 47%, 7%)" stroke="hsl(215, 20%, 65%)" stroke-width="1.25" />
      <line x1="625" y1="220" x2="625" y2="280" stroke="rgba(255,255,255,0.15)" />
      <line x1="640" y1="220" x2="640" y2="280" stroke="rgba(255,255,255,0.15)" />

      <!-- Cockpit Central Dining Table -->
      <rect x="705" y="235" width="52" height="30" rx="4" fill="hsl(33, 40%, 28%)" stroke="hsl(33, 45%, 45%)" stroke-width="1.5" />

      <!-- Helm stations stuurboord / bakboord -->
      <rect x="785" y="195" width="22" height="18" rx="2" fill="hsl(222, 10%, 22%)" stroke="hsl(215, 10%, 60%)" />
      <circle cx="796" cy="204" r="16" fill="none" stroke="hsl(215, 10%, 75%)" stroke-width="1.5" />
      <path d="M 802 201 L 805 198" stroke="hsl(42, 100%, 53%)" stroke-width="2" /> <!-- engine throttle -->

      <rect x="785" y="287" width="22" height="18" rx="2" fill="hsl(222, 10%, 22%)" stroke="hsl(215, 10%, 60%)" />
      <circle cx="796" cy="296" r="16" fill="none" stroke="hsl(215, 10%, 75%)" stroke-width="1.5" />

      <!-- Bow rollers & Winches -->
      <rect x="123" y="240" width="18" height="20" fill="hsl(215, 10%, 25%)" stroke="hsl(215, 10%, 65%)" />
      <path d="M 110 242 L 123 250 L 110 258 C 105 255, 105 245, 110 242 Z" fill="hsl(215, 10%, 48%)" stroke="hsl(215, 10%, 70%)" stroke-width="1" />
      <rect x="230" y="235" width="30" height="30" rx="3" fill="rgba(0, 240, 255, 0.1)" stroke="hsl(215, 20%, 65%)" stroke-width="1" />

      <!-- Mast base -->
      <ellipse cx="460" cy="250" rx="9" ry="13" fill="url(#metalGrad)" stroke="hsl(215, 10%, 80%)" stroke-width="1" />

      <!-- ZONDER ZEIL LAYOUT (HARBOR MODE: FENDERS OUT, SAIL FURLED) -->
      <g id="sails-furled-group">
        <!-- Boom with lazybag covers (Griek met reef/huik) -->
        <line x1="469" y1="250" x2="680" y2="250" stroke="hsl(222, 20%, 25%)" stroke-width="7" stroke-linecap="round" />
        <line x1="469" y1="250" x2="680" y2="250" stroke="url(#metalGrad)" stroke-width="1.5" />
        
        <!-- Hanging Fenders (Stootwillen overboord hangend) -->
        <g stroke="hsl(42, 100%, 53%)" stroke-width="1">
          <!-- Starboard Fenders -->
          <line x1="520" y1="130" x2="520" y2="120" /> <rect x="515" y="110" width="10" height="10" rx="3" fill="hsl(210, 10%, 98%)" stroke="hsl(215, 10%, 70%)" />
          <line x1="680" y1="130" x2="680" y2="120" /> <rect x="675" y="110" width="10" height="10" rx="3" fill="hsl(210, 10%, 98%)" stroke="hsl(215, 10%, 70%)" />
          <!-- Port Fenders -->
          <line x1="520" y1="370" x2="520" y2="380" /> <rect x="515" y="380" width="10" height="10" rx="3" fill="hsl(210, 10%, 98%)" stroke="hsl(215, 10%, 70%)" />
          <line x1="680" y1="370" x2="680" y2="380" /> <rect x="675" y="380" width="10" height="10" rx="3" fill="hsl(210, 10%, 98%)" stroke="hsl(215, 10%, 70%)" />
        </g>

        <!-- Mooring Lines (Landvasten) tied to cleats -->
        <g stroke="hsl(215, 10%, 80%)" stroke-width="1.5" opacity="0.75" fill="none">
          <!-- Bow springs and breast lines -->
          <path d="M 140,140 Q 90,110 50,110" />
          <path d="M 140,360 Q 90,390 50,390" />
          <!-- Stern breast lines -->
          <path d="M 870,140 Q 920,100 960,100" />
          <path d="M 870,360 Q 920,400 960,400" />
        </g>
      </g>

      <!-- MET ZEIL LAYOUT (UNDER SAIL: RIGGING ACTIVE, HULL HEELS) -->
      <g id="sails-active-group" style="display: none;">
        <!-- Boom rotated slightly out to leeward (Starboard side) -->
        <line x1="469" y1="250" x2="675" y2="280" stroke="url(#metalGrad)" stroke-width="5" stroke-linecap="round" />
        
        <!-- Hoisted Active Mainsail -->
        <path d="M 469,250 C 530,230, 610,240, 675,280 L 469,250" fill="rgba(255, 255, 255, 0.88)" stroke="hsl(215, 10%, 90%)" stroke-width="0.5" />
        
        <!-- Hoisted Active Jib/Genua -->
        <path d="M 230,250 C 320,230, 410,235, 455,275 L 230,250" fill="rgba(255, 255, 255, 0.78)" stroke="hsl(215, 10%, 90%)" stroke-width="0.5" />

        <!-- High-tension Sheets and Rigging lines -->
        <!-- Mainsail Sheet -->
        <line x1="675" y1="280" x2="730" y2="180" stroke="hsl(355, 80%, 45%)" stroke-width="1.5" stroke-dasharray="3,1" />
        <!-- Jib Sheet under high load to winch -->
        <line x1="455" y1="275" x2="730" y2="320" stroke="hsl(215, 80%, 55%)" stroke-width="1.5" stroke-dasharray="3,1" />
      </g>

      <!-- Winch locations (Exterior) -->
      <!-- Coachroof winches -->
      <circle cx="650" cy="180" r="7" fill="url(#metalGrad)" stroke="hsl(215, 10%, 85%)" stroke-width="1" />
      <circle cx="650" cy="180" r="4" fill="hsl(215, 10%, 20%)" />
      <circle cx="650" cy="320" r="7" fill="url(#metalGrad)" stroke="hsl(215, 10%, 85%)" stroke-width="1" />
      <circle cx="650" cy="320" r="4" fill="hsl(215, 10%, 20%)" />
      <!-- Sheet winches -->
      <circle cx="730" cy="180" r="8" fill="url(#metalGrad)" stroke="hsl(215, 10%, 85%)" stroke-width="1" />
      <circle cx="730" cy="180" r="4" fill="hsl(215, 10%, 20%)" />
      <circle cx="730" cy="320" r="8" fill="url(#metalGrad)" stroke="hsl(215, 10%, 85%)" stroke-width="1" />
      <circle cx="730" cy="320" r="4" fill="hsl(215, 10%, 20%)" />
    </g>

    <!-- ==========================================================================
         VIEW 2: CABIN / INTERIOR BLUEPRINT (3-CABIN LAYOUT)
         ========================================================================== -->
    <g id="cabin-view" style="display: none;">
      <!-- Cozy yellow light glow inside saloon -->
      <ellipse cx="500" cy="250" rx="280" ry="90" fill="url(#cabinLight)" />

      <!-- MAIN BULKHEADS (Wanden en Indeling) -->
      <!-- V-Berth bow bulkheads -->
      <path d="M 330,190 L 330,310 M 330,225 L 290,225 M 330,275 L 290,275" stroke="hsl(215, 20%, 65%)" stroke-width="2.5" />
      <!-- Aft cabin bulkheads -->
      <path d="M 680,180 L 680,320 M 680,250 L 850,250" stroke="hsl(215, 20%, 65%)" stroke-width="2.5" />

      <!-- FOREPEAK CABIN (Voorpiek V-Berth) -->
      <path d="M 170,250 L 330,200 L 330,300 Z" fill="hsl(222, 20%, 20%)" stroke="hsl(215, 20%, 45%)" />
      <text x="240" y="255" fill="var(--text-muted)" font-size="10" font-weight="600" opacity="0.6">V-BERTH / VOORPIEK</text>

      <!-- SALOON (Salon & Dining table) -->
      <!-- Large U-shaped seating starboard side -->
      <path d="M 340,195 L 530,195 L 530,225 L 370,225 L 370,250 Z" fill="hsl(222, 20%, 25%)" stroke="hsl(215, 20%, 45%)" />
      <!-- Saloon Dining Table -->
      <rect x="400" y="210" width="80" height="35" rx="3" fill="hsl(33, 40%, 30%)" stroke="hsl(33, 45%, 45%)" stroke-width="1.5" />
      
      <!-- GALLEY (Kombuis bakboord side) -->
      <!-- L-shape counter -->
      <path d="M 500,285 L 610,285 L 610,315 L 570,315 L 570,300 L 500,300 Z" fill="hsl(222, 10%, 25%)" stroke="hsl(215, 20%, 55%)" />
      <!-- Stove (Gasfornuis) circles -->
      <circle cx="585" cy="300" r="7" fill="hsl(222, 10%, 15%)" stroke="hsl(215, 10%, 60%)" />
      <circle cx="585" cy="300" r="3" fill="hsl(190, 95%, 50%)" opacity="0.6" /> <!-- blue burner -->
      <text x="510" y="295" fill="var(--text-muted)" font-size="8">Kombuis / Galley</text>

      <!-- NAVIGATION STATION (Navigatiehoek bakboord side) -->
      <rect x="440" y="280" width="35" height="20" fill="hsl(33, 40%, 22%)" stroke="hsl(33, 45%, 40%)" />
      <rect x="440" y="303" width="18" height="12" rx="1" fill="hsl(222, 10%, 20%)" stroke="hsl(215, 10%, 55%)" /> <!-- seat -->
      <!-- Switchboard panel layout -->
      <line x1="440" y1="280" x2="475" y2="280" stroke="hsl(190, 95%, 50%)" stroke-width="1.5" filter="url(#neonGlow)" />
      <text x="440" y="272" fill="hsl(190, 95%, 50%)" font-size="8" font-weight="700">NAV STATION</text>

      <!-- HEADS & SHOWER (Natte cel toilet stuurboord) -->
      <path d="M 610,180 L 680,180 L 680,240 L 610,240 Z" fill="hsl(222, 10%, 22%)" stroke="hsl(215, 20%, 55%)" />
      <!-- Toilet seat & pump handle -->
      <ellipse cx="640" cy="205" rx="8" ry="11" fill="hsl(210, 10%, 98%)" stroke="hsl(215, 10%, 70%)" />
      <rect x="652" y="200" width="4" height="10" rx="1" fill="hsl(215, 10%, 40%)" /> <!-- manual pump cylinder -->
      <text x="615" y="235" fill="var(--text-muted)" font-size="8">Heads / Toilet</text>

      <!-- ENGINE ROOM (Machinekamer between aft cabins) -->
      <rect x="690" y="222" width="70" height="56" rx="2" fill="hsl(222, 10%, 15%)" stroke="hsl(215, 10%, 45%)" />
      <ellipse cx="725" cy="250" rx="18" ry="10" fill="url(#metalGrad)" stroke="hsl(215, 10%, 70%)" /> <!-- Diesel engine block -->
      <text x="702" y="254" fill="hsl(42, 100%, 53%)" font-size="8" font-weight="700" opacity="0.8">YANMAR</text>

      <!-- AFT CABINS (Achterkajuiten bakboord & stuurboord) -->
      <!-- Port Aft Cabin Bed -->
      <rect x="765" y="260" width="115" height="98" fill="hsl(222, 20%, 18%)" stroke="hsl(215, 20%, 40%)" />
      <text x="772" y="310" fill="var(--text-muted)" font-size="9" font-weight="600" opacity="0.6">AFT CABIN (PORT)</text>
      <!-- Battery Switch panel locator -->
      <rect x="850" y="325" width="14" height="18" rx="1" fill="hsl(355, 80%, 48%)" stroke="hsl(215, 10%, 80%)" />
      <text x="850" y="320" fill="hsl(355, 80%, 48%)" font-size="7" font-weight="800">ACCU</text>

      <!-- Starboard Aft Cabin Bed -->
      <rect x="765" y="142" width="115" height="73" fill="hsl(222, 20%, 18%)" stroke="hsl(215, 20%, 40%)" />
      <text x="772" y="180" fill="var(--text-muted)" font-size="9" font-weight="600" opacity="0.6">AFT CABIN (STB)</text>
    </g>

  </g>
</svg>
